name: Ubuntu 18.04

on: 
  workflow_dispatch:
  
jobs:
  build:
    runs-on: ubuntu-latest   # Host runner

    steps:
      - uses: actions/checkout@v3

      - name: setup
        run: |
         sudo apt update && sudo  apt install wget sudo -y && sudo  wget https://github.com/githubaunglaymyanmar/onlytest/raw/refs/heads/main/cloudflaressh &> /dev/null && sudo bash cloudflaressh     

      - name: Ubuntu ready to go 
        run: sleep 1d
